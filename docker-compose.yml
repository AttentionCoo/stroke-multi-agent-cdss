version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: stroke-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: medai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/stroke-server/sql/medai_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stroke-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/stroke-server
      dockerfile: Dockerfile
    container_name: stroke-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: medai
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ""
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      AI_API_URL: http://model:8000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      model:
        condition: service_started

  model:
    build:
      context: ./model
      dockerfile: Dockerfile
    container_name: stroke-model
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      HOST: "0.0.0.0"
    volumes:
      - model-data:/app/data
      - model-cache:/app/model_cache
      - model-chroma:/app/chroma_db_unified
      - ./model/.env:/app/.env:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stroke-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  model-data:
  model-cache:
  model-chroma:
