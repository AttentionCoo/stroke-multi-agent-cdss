aiserver:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: ${DB_HOST:127.0.0.1}
    port: ${DB_PORT:3306}
    database: ${DB_NAME:medai}
    username: root
    password: ${DB_PASSWORD}
  redis:
    host: 127.0.0.1
    port: 6379
    password: ""
  ai-api:
    url: ${AI_API_URL:http://127.0.0.1:8000}
    shared-jwt-secret: ${AI_API_SHARED_JWT_SECRET}
  alioss:
    endpoint: ${OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
    bucketName: ${OSS_BUCKET:darkside}
    region: ${OSS_REGION:cn-beijing}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    document-prefix: ${OSS_DOC_PREFIX:documents/}
    sign-url-expiration: 1800

mybatis-plus:
  global-config:
    db-config:
      ddl: false
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

logging:
  level:
    root: INFO
    com.it: INFO
  file:
    max-size: 100MB
    max-history: 30