aiserver:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: ${MYSQL_HOST:localhost}
    port: ${MYSQL_PORT:3307}
    database: ${MYSQL_DATABASE:medai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
  ai-api:
    url: ${AI_API_URL:http://localhost:8000}
    shared-jwt-secret: dev-local-secret
  alioss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucketName: darkside
    region: cn-beijing
    access-key-id: ${ALIBABA_CLOUD_ACCESS_KEY_ID:}
    access-key-secret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:}
logging:
  level:
    root: INFO
