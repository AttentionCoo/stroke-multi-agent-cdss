spring:
  application:
    name: stroke-server
  main:
    allow-circular-references: true
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${aiserver.datasource.host}:${aiserver.datasource.port}/${aiserver.datasource.database}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
    driver-class-name: ${aiserver.datasource.driver-class-name}
    username: ${aiserver.datasource.username}
    password: ${aiserver.datasource.password}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  cache:
    type: redis
  mvc:
    async:
      request-timeout: 600000

  data:
    redis:
      host: ${aiserver.redis.host}
      port: ${aiserver.redis.port}
      password: ${aiserver.redis.password}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 3000ms
          time-between-eviction-runs: 10s

  codec:
    max-in-memory-size: 50MB

  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

      # datasource:
      #   flow:
      #     nacos:
      #       server-addr: 127.0.0.1:8848
      #       data-id: stroke-server-flow
      #       group-id: DEFAULT_GROUP
      #       data-type: json
    #       rule-type: flow

mybatis-plus:
  global-config:
    db-config:
      ddl: false
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

ai:
  api:
    url: ${aiserver.ai-api.url}
    connect-timeout: 10000
    read-timeout: 600000
  security:
    shared-jwt-secret: ${aiserver.ai-api.shared-jwt-secret}
  sse:
    ring-buffer-size: 200
    cache-ttl-minutes: 5

alioss:
  endpoint: ${aiserver.alioss.endpoint}
  bucketName: ${aiserver.alioss.bucketName}
  region: ${aiserver.alioss.region}
  access-key-id: ${aiserver.alioss.access-key-id}
  access-key-secret: ${aiserver.alioss.access-key-secret}

server:
  port: 8080
  tomcat:
    connection-timeout: 660s
    max-connections: 10000
    threads:
      max: 200
      min-spare: 10
    accept-count: 100

logging:
  file:
    path: /www/wwwroot/stroke-server/logs
    name: ${logging.file.path}/application.log
  level:
    root: INFO
    com.it: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

rate-limiter:
  global:
    limit: 200
    interval: 1
  ip:
    limit: 30
    interval: 60
  user:
    limit: 3
    interval: 60

resilience4j:
  circuitbreaker:
    instances:
      default:
        register-health-indicator: true
        sliding-window-size: 100
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s