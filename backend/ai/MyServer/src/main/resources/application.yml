spring:
  application:
    name: MyServer
  main:
    allow-circular-references: true  # 允许循环依赖，解决启动报错问题
  profiles:
    active: prod  # 本地开发使用dev，线上部署使用 --spring.profiles.active=prod

  datasource:
    url: jdbc:mysql://${aiserver.datasource.host}:${aiserver.datasource.port}/${aiserver.datasource.database}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
    driver-class-name: ${aiserver.datasource.driver-class-name}
    username: ${aiserver.datasource.username}
    password: ${aiserver.datasource.password}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  mvc:
    async:
      request-timeout: 600000   # 10分钟

  data:
    redis:
      host: ${aiserver.redis.host}
      port: ${aiserver.redis.port}
      password: ${aiserver.redis.password}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 3000ms
          time-between-eviction-runs: 10s

  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss


      # 规则持久化（如果使用 Nacos，可放开注释）
      # datasource:
      #   flow:
      #     nacos:
      #       server-addr: 127.0.0.1:8848
      #       data-id: MyServer-flow
      #       group-id: DEFAULT_GROUP
      #       data-type: json
    #       rule-type: flow

# Sentinel 日志目录（必须有权限写入）

mybatis-plus:
  global-config:
    db-config:
      ddl: false  # 关键点：禁用 DDL 运行器，解决 NullBean 报错
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 将原 mybatis 下的配置移至此处
    map-underscore-to-camel-case: true
# AI 服务配置
ai:
  api:
    url: ${aiserver.ai-api.url}
    connect-timeout: 10000
    read-timeout: 600000
  security:
    # ⚠️ 必须与 Python 模型服务的 AI_JWT_SECRET 环境变量保持完全一致
    # 生产环境：由 AI_API_SHARED_JWT_SECRET 环境变量注入（见 application-prod.yml）
    # 开发环境：由 application-dev.yml 中的 aiserver.ai-api.shared-jwt-secret 提供
    shared-jwt-secret: ${aiserver.ai-api.shared-jwt-secret}
  sse:
    ring-buffer-size: 200   # 每个 talkId 的滑动窗口事件数上限，超出后最旧事件被淘汰
    cache-ttl-minutes: 5    # done/error 后缓存保留时长（分钟），给重连留出窗口

# 阿里云 OSS
alioss:
  endpoint: ${aiserver.alioss.endpoint}
  bucketName: ${aiserver.alioss.bucketName}
  region: ${aiserver.alioss.region}
  access-key-id: ${aiserver.alioss.access-key-id}
  access-key-secret: ${aiserver.alioss.access-key-secret}

# 服务器配置
server:
  port: 8080
  tomcat:
    connection-timeout: 660s
    max-connections: 10000
    threads:
      max: 200
      min-spare: 10
    accept-count: 100

# 日志配置（宝塔环境推荐）
logging:
  file:
    path: /www/wwwroot/myserver/logs  # 宝塔默认路径
    name: ${logging.file.path}/application.log
  level:
    root: INFO
    com.yourpackage: DEBUG  # 替换成你的包名
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 限流配置
rate-limiter:
  global:
    limit: 200
    interval: 1
  ip:
    limit: 30
    interval: 60
  user:
    limit: 3
    interval: 60

# 熔断配置
resilience4j:
  circuitbreaker:
    instances:
      default:
        register-health-indicator: true
        sliding-window-size: 100
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
